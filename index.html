<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Harshita 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    height:100vh;
    overflow:hidden;
    color:white;
}

/* 🎥 VIDEOS */
.bg-video{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
    filter:brightness(0.5);
    transition:opacity 0.8s ease;
}

#video2{opacity:0;}

/* CONTAINER */
.container{
    position:relative;
    width:100%;
    height:100%;
}

/* INTRO */
.intro{
    position:absolute;
    top:40%;
    width:100%;
    text-align:center;
}

.heart-btn{
    font-size:45px;
    margin-top:20px;
    cursor:pointer;
}

/* OVERLAY */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition:0.5s;
}

.overlay.show{
    opacity:1;
    pointer-events:all;
}

.overlay h1{color:#ff4d88;font-size:32px;}
.overlay h2{margin-top:10px;font-size:20px;}

/* MAIN CARD */
.card{display:none;}

/* TOP TEXT */
.hero{
    position:absolute;
    top:60px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
}

.hero h1,.hero h2{color:#ff4d88;}

/* CENTER BUTTON */
.love-card{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:15px 25px;
    border-radius:30px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    cursor:pointer;
}

/* MESSAGE */
.message-card{
    display:none;
    position:absolute;
    bottom:80px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:320px;
}
    #title1 {
    font-size: 20px;   /* Happy Birthday chhota */
}

#title2 {
    font-size: 32px;   /* Harshita bada */
    font-weight: bold;
}

.message-card.show{display:block;}
</style>
</head>

<body>

<!-- 🎥 VIDEO 1 -->
<video autoplay muted loop playsinline class="bg-video" id="video1">
    <source src="From Main Klickpin CF- Pinterest Video - 6Y0kWTCBv (1).mp4" type="video/mp4">
</video>

<!-- 🎥 VIDEO 2 -->
<video autoplay muted loop playsinline class="bg-video" id="video2">
    <source src="From Main Klickpin CF- Video Pinterest - 1157GYOZh.mp4" type="video/mp4">
</video>

<div class="container">

<!-- INTRO -->
<div class="intro" id="intro">
    <h2>Here's something for you</h2>
    <br>
    <h2><b>Madam jiii💕</b></h2>
    <div class="heart-btn" onclick="start()">❤️</div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
    <h1 id="line1"></h1>
    <h2 id="line2"></h2>
</div>

<!-- MAIN -->
<div class="card" id="card">

    <div class="hero">
        <h1 id="title1"></h1>
        <h2 id="title2"></h2>
    </div>

    <div class="love-card" onclick="openCard()">
        💌 Tap to open
    </div>

    <div class="message-card" id="messageCard">
        <p id="finalMessage"></p>
    </div>

</div>

</div>

<script>

// START
function start(){

    // VIDEO SWITCH (smooth)
    const v1 = document.getElementById("video1");
    const v2 = document.getElementById("video2");

    v1.style.opacity = "0";
    v2.style.opacity = "1";

    // HIDE INTRO
    document.getElementById("intro").style.display = "none";

    // SHOW OVERLAY
    const overlay = document.getElementById("overlay");
    overlay.classList.add("show");

    let t1="Dear Harshiii ❤️";
    let t2="This is for you 🫶🫵";

    let i=0,j=0;

    function a(){
        if(i<t1.length){
            line1.innerHTML+=t1.charAt(i++);
            setTimeout(a,80);
        }else setTimeout(b,300);
    }

    function b(){
        if(j<t2.length){
            line2.innerHTML+=t2.charAt(j++);
            setTimeout(b,80);
        }else setTimeout(showMain,800);
    }

    function showMain(){
        overlay.classList.remove("show");
        document.getElementById("card").style.display="block";
        typeTitle();
    }

    a();
}

// TITLE
function typeTitle(){
    let t1="Happy Birthday 🎂🎂";
    let t2="💕Harshita💕";

    let i=0,j=0;

    title1.innerHTML="";
    title2.innerHTML="";

    function a(){
        if(i<t1.length){
            title1.innerHTML+=t1.charAt(i++);
            setTimeout(a,80);
        }else setTimeout(b,300);
    }

    function b(){
        if(j<t2.length){
            title2.innerHTML+=t2.charAt(j++);
            setTimeout(b,80);
        }
    }

    a();
}

// OPEN CARD
let opened=false;
function openCard(){
    if(opened)return;
    opened=true;

    document.getElementById("messageCard").classList.add("show");
    typeMessage();
}

// MESSAGE
function typeMessage(){
    let text=`There’s something really special about you…
the way you smile makes everything feel lighter.

You have a calm, positive vibe that’s rare.

Stay exactly the way you are,
because honestly… it suits you perfectly 🌸`;

    let i=0;
    let target=document.getElementById("finalMessage");
    target.innerHTML="";

    function t(){
        if(i<text.length){
            target.innerHTML+=text.charAt(i++);
            setTimeout(t,35);
        }
    }

    t();
}

</script>

</body>
</html>
